server {
    listen 443 ssl http2;
    server_name innerspace.sarxzer.xyz;

    root /var/www/innerspace/public;
    index index.php index.html;

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    ssl_certificate /etc/letsencrypt/live/innerspace.sarxzer.xyz/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/innerspace.sarxzer.xyz/privkey.pem; # managed by Certbot
}